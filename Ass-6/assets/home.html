<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />  
    <title>Makaton</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="home">
        <div class="navbar">
            <div class="nav-logo">Makaton</div>
            <div class="nav-btns">
                <a href="login.html"><i class="fa-solid fa-user"></i></a>
                <button onclick="log()" class="nav-join-btn">Join a call</button>
                <button onclick="log()" class="nav-start-btn">Start a call</button>
            </div>
        </div>

        <div class="main">
            <div class="main-info">
                <div class="info">
                    <span class="info-title">Video calls made easy <br/>with</span>&nbsp;&nbsp;&nbsp;<span class="title-span">Makaton.</span><br><br>
                    <span class="info-detail">We develop the service to make communication <br/>easy for deaf - mute </span><span class="detail-span">people.</span>
                </div>
                <div class="bedge">
                    <a href="login.html" class="video-btn"><i class="fa-solid fa-video"></i></a>
                    <div class="link-btn">
                        <a href="login.html" class="link-logo"><i class="fa-solid fa-link"></i></a>
                        <a href="login.html" class="link-code">Enter a code or link</a>
                    </div>
                </div>
                <div class="about-us">
                    <p>Learn more about <span>Makaton...</span></p>
                </div>
            </div>
            <div class="boxes">
                <button class="backward"><i class="fa-solid fa-less-than"></i></button>
                <div class ="cards" >
                    <div class="security card">
                        <i class="fa-solid fa-lock security-logo "></i>
                        <p class="security-info">Calls end to end encrypted.</p>
                    </div>
                    <div class="connect card">
                        <i class="fa-solid fa-link connect-logo"></i>
                        <p class="connect-info">Share link to join video call or meeting. </p>
                    </div>
                    <!-- <div class="anywhere card">
                        <i class="fa-solid fa-thumbs-up anywhere-logo"></i>
                        <p class="anywhere-info">Video call anywhere just with one click</p>
                    </div> -->
                </div>
                <button class="forward"><i class="fa-solid fa-greater-than"></i></button>
            </div>
        </div>

        <div class="footer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
